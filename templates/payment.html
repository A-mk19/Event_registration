<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <style>
        body { text-align: center; font-family: Arial; }
        #timer { font-size: 26px; color: red; margin: 10px; }
    </style>
</head>
<body>

<h2>💰 Pay ₹700</h2>

<div id="timer">05:00</div>

<img src="{{ url_for('static', filename=qr_file) }}?v={{ reg_id }}" width="220">

<form action="/verify" method="POST">
    <input type="text" name="reg_id" placeholder="Enter REG_ID" required>
    <button type="submit">Verify</button>
</form>

<script>
    const expiry = new Date("{{ expiry_time }}").getTime();

    const timerEl = document.getElementById("timer");

    const interval = setInterval(() => {
        const now = new Date().getTime();
        const distance = expiry - now;

        if (distance <= 0) {
            clearInterval(interval);
            timerEl.innerHTML = "00:00";

            setTimeout(() => {
                window.location.href = "/";
            }, 2000);

            return;
        }

        const minutes = Math.floor(distance / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        timerEl.innerHTML =
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');

    }, 1000);
</script>

</body>
</html>
