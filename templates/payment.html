<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VREC MEMORIA 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    color: white;
}

/* CONTAINER */
.container {
    display: flex;
    height: 100vh;
}

/* LEFT */
.left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* RIGHT */
.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BOX */
.payment-box {
    width: 90%;
    max-width: 350px;
    padding: 25px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    text-align: center;
}

/* TIMER */
#timer {
    font-size: 32px;
    color: red;
    margin: 15px 0;
}

/* QR */
.qr {
    width: 180px;
    margin: 15px 0;
}

/* INPUT */
input {
    width: 90%;
    padding: 12px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: gold;
    border: none;
    border-radius: 6px;
}

/* MOBILE */
@media(max-width: 768px){
    .container {
        flex-direction: column;
        height: auto;
        padding: 20px 10px;
    }

    .left {
        margin-bottom: 20px;
    }

    #timer {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
    <img src="{{ url_for('static', filename='vlogo.png') }}" width="100">
    <h3>VIJAY RURAL ENGINEERING COLLEGE</h3>
    <h1 style="color:gold;">MEMORIA 2026</h1>
    <p style="opacity:0.7;">Where Memories Become Forever</p>
</div>

<div class="right">
<div class="payment-box">

<h2>Payment</h2>
<h3 style="color:#00ffae;">₹700</h3>

<div id="timer"></div>

<img class="qr" src="{{ url_for('static', filename=qr_file) }}">

<form action="/verify" method="POST">
<input name="reg_id" placeholder="Enter REG_ID" required>
<button type="submit">Verify</button>
</form>

</div>
</div>

</div>

<script>
let timeLeft = {{ remaining_seconds }};
const timerEl = document.getElementById("timer");

// Disable form when expired
const form = document.querySelector("form");
const button = document.querySelector("button");

const interval = setInterval(() => {

    if (timeLeft <= 0) {
        clearInterval(interval);

        // Show expired
        timerEl.innerHTML = "EXPIRED";

        // Disable input + button
        if(form){
            form.querySelectorAll("input").forEach(inp => inp.disabled = true);
        }
        if(button){
            button.disabled = true;
            button.innerText = "Session Expired";
        }

        // 🔄 Redirect after 2 sec
        setTimeout(() => {
            window.location.href = "/";
        }, 2000);

        return;
    }

    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;

    timerEl.innerHTML =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');

    timeLeft--;

}, 1000);
</script>
</body>
</html>
