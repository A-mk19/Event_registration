<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        .amount {
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #timer {
            font-size: 32px;
            font-weight: bold;
            color: red;
            margin-bottom: 20px;
        }

        img {
            margin: 15px 0;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💰 Event Payment</h2>
    <div class="amount">Pay ₹700</div>

    <div id="timer"></div>

    <img src="{{ url_for('static', filename=qr_file) }}" width="200">

    <form action="/verify" method="POST">
        <input name="reg_id" placeholder="Enter REG_ID from payment note" required>
        <button>Verify Payment</button>
    </form>

    <div class="note">
        After payment, check your payment message and enter the REG_ID to verify.
    </div>

</div>

<!-- TIMER SCRIPT -->
<script>
let timeLeft = {{ remaining_seconds }};
const timerEl = document.getElementById("timer");

const interval = setInterval(() => {

    if (timeLeft <= 0) {
        clearInterval(interval);
        timerEl.innerHTML = "00:00";
        setTimeout(() => window.location.href = "/", 1000);
        return;
    }

    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;

    timerEl.innerHTML =
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');

    timeLeft--;

}, 1000);
</script>

</body>
</html>
